name: Release

# Auto-tag and publish a GitHub Release on every push to main that contains
# releasable changes. Versioning scheme: CalVer (vYYYY.MM.DD, with .N suffix
# for additional same-day releases). Changelog is grouped by conventional
# commit type. Pushes that contain only docs/chore/style/ci/test/build
# commits are skipped; add `[skip release]` to a commit body to force-skip.

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      force:
        description: 'Force a release even with no releasable commits'
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Tag and release
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout (full history + tags)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Configure git identity
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'

      - name: Decide whether to release
        id: prep
        shell: bash
        env:
          FORCE: ${{ github.event.inputs.force }}
        run: |
          set -euo pipefail

          LAST_TAG=$(git tag --list 'v*' --sort=-v:refname | head -n1 || true)
          if [ -n "$LAST_TAG" ]; then
            RANGE="${LAST_TAG}..HEAD"
          else
            RANGE="HEAD"
          fi
          echo "last_tag=${LAST_TAG}" >> "$GITHUB_OUTPUT"
          echo "range=${RANGE}" >> "$GITHUB_OUTPUT"
          echo "Last tag: ${LAST_TAG:-<none, first release>}"
          echo "Range:    ${RANGE}"

          COMMIT_COUNT=$(git rev-list --count ${RANGE})
          echo "Commits in range: ${COMMIT_COUNT}"
          if [ "$COMMIT_COUNT" = "0" ]; then
            echo "::notice::No new commits since last tag. Nothing to release."
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "${FORCE:-false}" != "true" ]; then
            if git log "$RANGE" --pretty=%B | grep -qiE '\[skip[ -]release\]'; then
              echo "::notice::Found [skip release] marker. Skipping."
              echo "should_release=false" >> "$GITHUB_OUTPUT"
              exit 0
            fi

            NON_TRIVIAL=$(git log "$RANGE" --pretty=format:%s \
              | grep -cvE '^(docs|chore|style|ci|test|build)(\([^)]+\))?(!)?:' || true)
            echo "Non-trivial commits: ${NON_TRIVIAL}"
            if [ "$NON_TRIVIAL" = "0" ]; then
              echo "::notice::All ${COMMIT_COUNT} commits are trivial (docs/chore/style/ci/test/build). Skipping."
              echo "should_release=false" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          else
            echo "Force flag set — releasing regardless of commit types."
          fi

          DATE=$(date -u +%Y.%m.%d)
          BASE="v${DATE}"
          if git rev-parse -q --verify "refs/tags/${BASE}" >/dev/null; then
            i=1
            while git rev-parse -q --verify "refs/tags/${BASE}.${i}" >/dev/null; do
              i=$((i + 1))
            done
            NEW_TAG="${BASE}.${i}"
          else
            NEW_TAG="${BASE}"
          fi
          echo "new_tag=${NEW_TAG}" >> "$GITHUB_OUTPUT"
          echo "should_release=true" >> "$GITHUB_OUTPUT"
          echo "::notice::Will release ${NEW_TAG}"

      - name: Build grouped changelog
        if: steps.prep.outputs.should_release == 'true'
        shell: bash
        env:
          RANGE: ${{ steps.prep.outputs.range }}
          LAST_TAG: ${{ steps.prep.outputs.last_tag }}
          NEW_TAG: ${{ steps.prep.outputs.new_tag }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          # Emit a section if any commits in $RANGE match $pattern (ERE, on subject line).
          # Commits are formatted: "- <clean subject> (<short-sha>) — @<author>"
          section() {
            local title="$1" pattern="$2"
            local rows
            rows=$(git log "$RANGE" --no-merges --pretty=$'format:%H\t%s\t%an' \
              | awk -F'\t' -v pat="$pattern" '$2 ~ pat {print}' || true)
            [ -z "$rows" ] && return 0

            printf '\n### %s\n\n' "$title"
            while IFS=$'\t' read -r sha subj author; do
              clean=$(printf '%s' "$subj" | sed -E 's/^[a-z]+(\([^)]+\))?(!)?: ?//')
              short="${sha:0:7}"
              printf -- '- %s ([`%s`](https://github.com/%s/commit/%s)) — @%s\n' \
                "$clean" "$short" "$REPO" "$sha" "$author"
            done <<< "$rows"
          }

          {
            if [ -n "$LAST_TAG" ]; then
              printf "## What's changed since [\`%s\`](https://github.com/%s/releases/tag/%s)\n" \
                "$LAST_TAG" "$REPO" "$LAST_TAG"
            else
              printf "## What's changed (initial release)\n"
            fi

            # Note: literal parens use [(] / [)] character classes — gawk's `-v`
            # strips backslashes, so `\(` would become a metacharacter group.
            section 'Breaking changes' '^[a-z]+([(][^)]+[)])?!:'
            section 'Features'         '^feat([(][^)]+[)])?(!)?:'
            section 'Bug fixes'        '^fix([(][^)]+[)])?(!)?:'
            section 'Performance'      '^perf([(][^)]+[)])?(!)?:'
            section 'Refactors'        '^refactor([(][^)]+[)])?(!)?:'
            section 'Documentation'    '^docs([(][^)]+[)])?(!)?:'
            section 'Tests'            '^test([(][^)]+[)])?(!)?:'
            section 'Build & CI'       '^(ci|build)([(][^)]+[)])?(!)?:'
            section 'Chores'           '^(chore|style)([(][^)]+[)])?(!)?:'
            section 'Reverts'          '^revert([(][^)]+[)])?(!)?:'

            # Catch-all: commits whose subject does not match conventional-commit pattern
            others=$(git log "$RANGE" --no-merges --pretty=$'format:%H\t%s\t%an' \
              | awk -F'\t' '$2 !~ /^[a-z]+(\([^)]+\))?(!)?:/ {print}' || true)
            if [ -n "$others" ]; then
              printf '\n### Other changes\n\n'
              while IFS=$'\t' read -r sha subj author; do
                short="${sha:0:7}"
                printf -- '- %s ([`%s`](https://github.com/%s/commit/%s)) — @%s\n' \
                  "$subj" "$short" "$REPO" "$sha" "$author"
              done <<< "$others"
            fi

            printf '\n---\n'
            if [ -n "$LAST_TAG" ]; then
              printf '**Full diff:** https://github.com/%s/compare/%s...%s\n' \
                "$REPO" "$LAST_TAG" "$NEW_TAG"
            fi
          } > CHANGELOG_NOTES.md

          echo '----- generated release notes -----'
          cat CHANGELOG_NOTES.md
          echo '-----'

      - name: Create tag and GitHub Release
        if: steps.prep.outputs.should_release == 'true'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NEW_TAG: ${{ steps.prep.outputs.new_tag }}
        run: |
          set -euo pipefail
          git tag -a "$NEW_TAG" -m "Release ${NEW_TAG}"
          git push origin "refs/tags/${NEW_TAG}"
          gh release create "$NEW_TAG" \
            --title "$NEW_TAG" \
            --notes-file CHANGELOG_NOTES.md \
            --latest
          echo "::notice::Released ${NEW_TAG} — https://github.com/${GITHUB_REPOSITORY}/releases/tag/${NEW_TAG}"
